<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 109 109" width="109" height="109">
  <style>
    .trace {
      fill: none;
      stroke: #111827;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 6;
      stroke-dasharray: 220;
